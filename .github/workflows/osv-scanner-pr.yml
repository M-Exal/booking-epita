name: Security Scans

on:
  push:
  pull_request:

permissions:
  contents: read
  security-events: write

jobs:
  osv-scan:
    name: Run OSV Scanner
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run osv-scanner
        uses: google/osv-scanner-action/osv-scanner-action@main
        with:
          scan-args: --format sarif --output DependenciesAnalysisFull.sarif ./
        continue-on-error: true

      - name: Upload SARIF (OSV)
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: DependenciesAnalysisFull.sarif

  semgrep:
    name: Run Semgrep
    runs-on: ubuntu-latest

    container:
      image: returntocorp/semgrep@main

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Semgrep scan
        run: |
          semgrep scan \
            --config .semgrep \
            --sarif \
            --output semgrep.sarif

      - name: Upload SARIF (Semgrep)
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep.sarif
