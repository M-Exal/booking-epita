name: Run OSV Scanner

on:
  push:
  pull_request:

jobs:
  osv-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Run osv-scanner
        uses: google/osv-scanner-action/osv-scanner-action@<SHA256>
        with:
          scan-args: --format sarif --output DependenciesAnalysisFull.sarif ./
        continue-on-error: true

      - name: Upload SARIF report
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: DependenciesAnalysisFull.sarif
