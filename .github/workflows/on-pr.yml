name: Security Scans

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  # --- JOB 1: Analyse des Dépendances (OSV) ---
  DependenciesAnalysis:
    name: Run OSV Scanner
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run OSV Scanner (Current)
        uses: google/osv-scanner-action/osv-scanner-action@main
        with:
          scan-args: --format sarif --output pr-analysis.sarif --fail-on-vuln ./
        continue-on-error: true

      - name: Run OSV Scanner (Baseline)
        if: github.event_name == 'pull_request'
        uses: google/osv-scanner-action/osv-scanner-action@main
        with:
          # On scanne directement le commit de base sans faire de checkout pour éviter les erreurs Git
          scan-args: --format sarif --output baseline-analysis.sarif --commit ${{ github.event.pull_request.base.sha }}
        continue-on-error: true

      - name: Generate Differential Report
        if: github.event_name == 'pull_request'
        run: |
          echo "### OSV Security Scan Diff" > diff-report.txt
          diff baseline-analysis.sarif pr-analysis.sarif >> diff-report.txt || true

      - name: Save OSV Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: osv-differential-report
          path: |
            pr-analysis.sarif
            diff-report.txt

      - name: Fail if vulnerabilities found
        if: github.event_name == 'pull_request'
        run: |
          if grep -q "result" pr-analysis.sarif; then
            echo "Vulnerabilities detected!"
            exit 1
          fi

  # --- JOB 2: Analyse du Code Source (Semgrep) ---
  SourceCodeAnalysis:
    name: Run Semgrep
    runs-on: ubuntu-latest
    container:
      image: returntocorp/semgrep:latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Semgrep Scan
        run: |
          # On définit la baseline : si c'est une PR, on prend la base, sinon on ne met pas de baseline
          BASELINE_ARG=""
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASELINE_ARG="--baseline-commit ${{ github.event.pull_request.base.sha }}"
          fi
          
          semgrep scan \
            --config .semgrep \
            --config "p/java" \
            --config "p/owasp-top-10" \
            $BASELINE_ARG \
            --sarif \
            --output semgrep-diff.sarif \
            --error

      - name: Save Semgrep Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-differential-report
          path: semgrep-diff.sarif

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: semgrep-diff.sarif
