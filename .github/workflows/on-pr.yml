name: Security Scans

on:
  pull_request:
    branches: [ main, master ]

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  # --- JOB 1: Analyse des Dépendances ---
  DependenciesAnalysis:
    name: Run OSV Scanner
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR Branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run OSV Scanner (Current PR)
        uses: google/osv-scanner-action/osv-scanner-action@main
        with:
          scan-args: --format sarif --output pr-analysis.sarif ./
        continue-on-error: true

      - name: checkout baseline commit
        run: |
          git checkout ${{ github.event.pull_request.base.sha }}

      - name: Run OSV Scanner (Baseline)
        uses: google/osv-scanner-action/osv-scanner-action@main
        with:
          scan-args: --format sarif --output baseline-analysis.sarif ./
        continue-on-error: true

      - name: Generate Differential Report
        run: |
          echo "### OSV Security Scan Diff" > diff-report.txt
          echo "Baseline: ${{ github.event.pull_request.base.sha }}" >> diff-report.txt
          echo "PR Head: ${{ github.sha }}" >> diff-report.txt
          echo "-----------------------------------" >> diff-report.txt
          # Un diff simple pour identifier les nouvelles vulnérabilités détectées dans le SARIF
          diff baseline-analysis.sarif pr-analysis.sarif >> diff-report.txt || true

      - name: Save differential report as artifact
        uses: actions/upload-artifact@v4
        with:
          name: osv-differential-report
          path: diff-report.txt

  # --- JOB 2: Analyse du Code Source ---
  SourceCodeAnalysis:
    name: Run Semgrep
    runs-on: ubuntu-latest
    container:
      image: returntocorp/semgrep:latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run differential analysis with semgrep
        run: |
          semgrep scan \
            --config .semgrep \
            --baseline-commit ${{ github.event.pull_request.base.sha }} \
            --sarif \
            --output semgrep-diff.sarif

      - name: Save differential report as artifact
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-differential-report
          path: semgrep-diff.sarif

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep-diff.sarif
