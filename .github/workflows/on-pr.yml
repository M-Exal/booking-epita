name: Security Differential Scans

on:
  pull_request:
    branches: [ main, master ]

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  # --- JOB 1: Analyse des Dépendances (OSV) ---
  DependenciesAnalysis:
    name: OSV Differential Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR Branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Important pour pouvoir switcher entre les commits

      - name: Run OSV Scanner (Current PR)
        uses: google/osv-scanner-action/osv-scanner-action@main
        with:
          scan-args: --format sarif --output pr-analysis.sarif ./
        continue-on-error: true

      - name: Checkout Baseline Commit
        run: |
          git checkout ${{ github.event.pull_request.base.sha }}

      - name: Run OSV Scanner (Baseline)
        uses: google/osv-scanner-action/osv-scanner-action@main
        with:
          scan-args: --format sarif --output baseline-analysis.sarif ./
        continue-on-error: true

      - name: Generate Differential Artifact
        run: |
          echo "### OSV Security Scan Differential Report" > diff-report.md
          echo "Comparison between ${{ github.event.pull_request.base.sha }} and ${{ github.sha }}" >> diff-report.md
          # On utilise un diff simple pour identifier les changements dans les dépendances vulnérables
          diff baseline-analysis.sarif pr-analysis.sarif > osv-diff.patch || true
        continue-on-error: true

      - name: Save OSV Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: osv-differential-reports
          path: |
            pr-analysis.sarif
            baseline-analysis.sarif
            osv-diff.patch

  # --- JOB 2: Analyse du Code Source (Semgrep) ---
  SourceCodeAnalysis:
    name: Semgrep Differential Scan
    runs-on: ubuntu-latest
    container:
      image: returntocorp/semgrep:latest
    steps:
      - name: Checkout PR Branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Semgrep differential analysis
        run: |
          semgrep scan \
            --config .semgrep \
            --baseline-commit ${{ github.event.pull_request.base.sha }} \
            --sarif \
            --output semgrep-diff.sarif

      - name: Save Semgrep Artifact
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-differential-report
          path: semgrep-diff.sarif

      - name: Upload to GitHub Security Tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep-diff.sarif
